  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
  <meta name="theme-color" content="#f2ede6"/>
  <meta content="true" name="HandheldFriendly"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Симулятор электростатических взаимодействий и проводников">
  <meta http-equiv="Cache-Control" content="public, max-age=86400">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="front.css">
  <script>_onload = [];</script>
  <script src="js/menu.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/runner.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/front_events.js"></script>
  <script src="js/right_menu.js"></script>
</head>
<body onload="_onload.map(x=>x())">

  <!-- Верхняя панель инструментов -->
  <div class="menu top-menu" id="top_menu"></div>

  <!-- Левая панель: кнопки инструментов -->
  <div class="menu left-menu" id="left_menu"></div>

  <!-- Центральная панель: canvas -->
  <div class="menu center-menu" id="center_menu">
    <canvas id="canvas" width="600" height="600"></canvas>
    <div id="select_file" style="display:none;"></div>
  </div>

  <!-- Правая панель: свойства объекта -->
  <div class="menu right-menu" id="right_menu"></div>

  <!-- Нижняя строка статуса -->
  <div class="menu bottom-menu" id="bottom_menu">
    <div id="transformed-mouse-pos">Мир: —</div>
    <div id="mouse-pos">Экран: —</div>
    <div id="fps"></div>
  </div>

  <!-- Тултип: φ и E в точке мыши (позиционируется через JS) -->
  <div id="field_tooltip"></div>

  <!-- Легенда σ -->
  <div id="sigma_legend">
    <span style="color:#b34040">■</span> σ &gt; 0 &nbsp;
    <span style="color:#3a68a8">■</span> σ &lt; 0
  </div>

  <!-- Шкала потенциала -->
  <div id="potential_colorbar">
    <div class="potential_colorbar_title">
      <span>Потенциал φ</span>
      <span id="potential_colorbar_range">диапазон: ±1 В</span>
    </div>
    <div class="potential_colorbar_scale"></div>
    <div class="potential_colorbar_ticks" id="potential_colorbar_ticks">
      <span id="potential_colorbar_min">-1</span>
      <span id="potential_colorbar_neg_mid">-0.5</span>
      <span id="potential_colorbar_mid">0</span>
      <span id="potential_colorbar_pos_mid">+0.5</span>
      <span id="potential_colorbar_max">+1</span>
    </div>
  </div>

  <script>
    // Позиционируем тултип рядом с курсором
    document.getElementById('canvas') && document.addEventListener('mousemove', function(ev) {
      var tt = document.getElementById('field_tooltip');
      if (!tt) return;
      var x = ev.clientX + 16, y = ev.clientY + 16;
      // Не выходить за правый и нижний края
      if (x + 180 > window.innerWidth)  x = ev.clientX - 180;
      if (y + 100 > window.innerHeight) y = ev.clientY - 100;
      tt.style.left = x + 'px';
      tt.style.top  = y + 'px';
      tt.classList.add('visible');
    });
    document.addEventListener('mouseleave', function() {
      var tt = document.getElementById('field_tooltip');
      if (tt) tt.classList.remove('visible');
    });
  </script>
</body>
</html>
